services:

  # ─────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/model/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Interface d'administration – Adminer
  # ─────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha   # thème optionnel
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # ─────────────────────────────────────────
  # API Node.js / Express
  # ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-mydb}
    volumes:
      - ./backend:/app      # hot-reload en développement
      - ./front:/front:ro   # fichiers front servis par Express
      - /app/node_modules   # isolation des node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

# ─────────────────────────────────────────
# Volumes persistants
# ─────────────────────────────────────────
volumes:
  postgres_data:

# ─────────────────────────────────────────
# Réseau interne partagé
# ─────────────────────────────────────────
networks:
  app_network:
    driver: bridge
